# .github/workflows/keepalive.yml
#
# Runs on the 1st of every month and makes an empty commit.
# This prevents GitHub from silently disabling the Morning Briefing
# scheduled workflow, which happens when all recent commits are from
# a bot (the briefing auto-commit) rather than a human.
#
# No configuration required — this works automatically for all users
# of this template.

name: Keepalive

on:
  schedule:
    - cron: '0 10 1 * *'   # 1st of every month at 10:00 UTC
  workflow_dispatch:         # can also be triggered manually if needed

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Keep workflow active
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push
