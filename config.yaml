topics:
  - name: "Frontier Tech / AI"
    description: >
      AI, quantum computing, semiconductors/GPU supply chain, compute
      infrastructure, photonics, bio/biotech, space/launch, robotics

  - name: "Applied Tech & Industry"
    description: >
      Big Tech strategy, startups & VC, enterprise AI adoption, major
      M&A/funding/IPOs/earnings, platform shifts, talent signals

  - name: "US Policy & Power"
    description: >
      Tech regulation, fiscal/monetary, defense & industrial policy, White
      House & Congress, budget, judicial decisions, elections, science policy

  - name: "AI Regulation & Governance"
    description: >
      US executive orders, EU AI Act, global frameworks, industry
      self-regulation, safety institutes

  - name: "Geopolitics"
    description: "US-China, Middle East, India, UK/EU, Latin America, Africa"

  - name: "China"
    description: "Tech decoupling, economic health, Taiwan, industrial overcapacity"

  - name: "Markets"
    description: >
      Equities, rates/Fed, VC, commodities, central banks, inflation, bonds,
      currencies

  - name: "Digital Finance"
    description: "Crypto regulation, CBDCs, stablecoins, DeFi"

  - name: "Energy"
    description: "Oil & gas, nuclear/renewables, AI infrastructure, grid"

  - name: "Defense & Security"
    description: "Conflicts, military tech, cyber, intelligence"

  - name: "Labor & Workforce"
    description: "AI displacement, immigration/talent, unions, remote work"

  - name: "UK Politics"
    description: "UK political developments, future outlook"

sources:
  preferred:
    - Financial Times
    - Wall Street Journal
    - Semafor
    - Reuters
    - Al Jazeera
    - AP
    - The Economist
    - The Atlantic
    - Bloomberg
    - New York Times
    - MIT Technology Review

sections:
  top_stories: true
  sector_scan: true
  week_ahead: true
  pattern_watch: true
  deep_dive: true

schedule:
  cron: "30 5 * * 1-5"
  timezone: "Europe/London"

output:
  dir: "~/briefings"
